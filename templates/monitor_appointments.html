<!DOCTYPE html>
<html>
<head>
    <title>Monitor Appointments</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2>All System Appointments</h2>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Patient</th>
                <th>Doctor</th>
                <th>Date</th>
                <th>Time</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for appt in appointments %}
            <tr>
                <td>{{ appt[0] }}</td>
                <td>{{ appt[1] }}</td>
                <td>{{ appt[2] }}</td>
                <td>{{ appt[3].strftime('%Y-%m-%d') }}</td>
                <td>{{ appt[4] }}</td>
                <td><span class="badge badge-dark">{{ appt[5] }}</span></td>
            </tr>
            {% else %}
            <tr>
                <td colspan="6" class="text-center">No appointments in the system.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Back to Dashboard</a>
</div>
</body>
</html>
