<!DOCTYPE html>
<html>
<head>
    <title>Write Prescription</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2>Write Prescription for Appointment #{{ appointment_id }}</h2>
    <form method="post">
        <div class="form-group">
            <label for="prescription">Prescription Details</label>
            <textarea class="form-control" name="prescription" id="prescription" rows="8" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Save Prescription</button>
        <a href="{{ url_for('doctor_appointments') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
