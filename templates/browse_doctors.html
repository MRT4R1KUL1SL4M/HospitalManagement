<!DOCTYPE html>
<html>
<head>
    <title>Browse Doctors</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2>Available Doctors</h2>
    <table class="table table-hover">
        <thead>
            <tr>
                <th>Doctor Name</th>
                <th>Department</th>
                <th>Specialization</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for doctor in doctors %}
            <tr>
                <td>{{ doctor[1] }}</td>
                <td>{{ doctor[2] }}</td>
                <td>{{ doctor[3] }}</td>
                <td>
                    <a href="{{ url_for('book_appointment', doctor_id=doctor[0]) }}" class="btn btn-success">Book Appointment</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <a href="{{ url_for('user_dashboard') }}" class="btn btn-secondary">Back to Dashboard</a>
</div>
</body>
</html>
